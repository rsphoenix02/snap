options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/snap-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/snap-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/snap-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/snap-backend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'snap-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/snap-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
